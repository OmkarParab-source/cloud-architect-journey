vpc:
  name: prod-vpc
  cidr: 10.0.0.0/16

subnets:
  - name: public-subnet-1
    cidr: 10.0.1.0/24
    type: public
    az: ap-south-1a

  - name: public-subnet-2
    cidr: 10.0.3.0/24
    type: public
    az: ap-south-1b

  - name: private-subnet-1
    cidr: 10.0.2.0/24
    type: private
    az: ap-south-1a

  - name: private-subnet-2
    cidr: 10.0.4.0/24
    type: private
    az: ap-south-1b

internet_gateway:
  name: igw-prod
  attached_to: prod-vpc

elastic_ips:
  - name: nat-eip-az-a
  - name: nat-eip-az-b

nat_gateways:
  - name: nat-az-a
    subnet: public-subnet-1
    elastic_ip: nat-eip-az-a

  - name: nat-az-b
    subnet: public-subnet-2
    elastic_ip: nat-eip-az-b

route_tables:
  - name: public-rt
    routes:
      - destination: 0.0.0.0/0
        target: igw-prod
    associated_subnets:
      - public-subnet-1
      - public-subnet-2

  - name: private-rt-az-a
    routes:
      - destination: 0.0.0.0/0
        target: nat-az-a
    associated_subnets:
      - private-subnet-1

  - name: private-rt-az-b
    routes:
      - destination: 0.0.0.0/0
        target: nat-az-b
    associated_subnets:
      - private-subnet-2

security_groups:
  - name: alb-sg-public
    description: Public access to ALB
    inbound:
      - port: 80
        protocol: tcp
        source: 0.0.0.0/0
    outbound:
      - port: all
        protocol: all
        destination: 0.0.0.0/0

  - name: web-sg-private
    description: Web tier restricted to ALB
    inbound:
      - port: 80
        protocol: tcp
        source: alb-sg-public
    outbound:
      - port: all
        protocol: all
        destination: 0.0.0.0/0

load_balancer:
  name: alb-web-public
  type: application
  scheme: internet-facing
  subnets:
    - public-subnet-1
    - public-subnet-2
  security_group: alb-sg-public

listener:
  port: 80
  protocol: HTTP
  default_action:
    type: forward
    target_group: tg-web-http

target_group:
  name: tg-web-http
  protocol: HTTP
  port: 80
  health_check:
    path: /
    protocol: HTTP
    interval: 30
    healthy_threshold: 3
    unhealthy_threshold: 3

launch_template:
  name: lt-web-server
  instance_type: t3.micro
  ami: latest-amazon-linux-2023
  security_group: web-sg-private
  iam_role: ec2_role

auto_scaling_group:
  name: asg-web-app
  subnets:
    - private-subnet-1
    - private-subnet-2
  min_size: 2
  desired_capacity: 2
  max_size: 6
  target_group: tg-web-http

access:
  method: ssm

observability:
  cloudwatch:
    logs: enabled
    metrics: enabled
    alarms:
      - name: cpu_high
        metric: CPUUtilization
        threshold: 80
      - name: unhealthy_hosts
        metric: UnHealthyHostCount
        threshold: 1

state_management:
  backend:
    type: s3
    locking: dynamodb

iam:
  roles:
    - name: ec2_role
      purpose: instance_access_and_ssm
    - name: terraform_execution_role
      purpose: infrastructure_provisioning
