environment: dev
service: cloud-arch

environments:
  - dev
  - staging
  - prod

vpc:
  name: cloud-arch-dev-vpc
  cidr: 10.0.0.0/16
  dns_support: true
  dns_hostnames: true

subnets:
  public:
    - name: cloud-arch-dev-public-az-a
      cidr: 10.0.1.0/24
      az: ap-south-1a

    - name: cloud-arch-dev-public-az-b
      cidr: 10.0.3.0/24
      az: ap-south-1b

  private:
    - name: cloud-arch-dev-private-az-a
      cidr: 10.0.2.0/24
      az: ap-south-1a

    - name: cloud-arch-dev-private-az-b
      cidr: 10.0.4.0/24
      az: ap-south-1b

networking:
  internet_gateway:
    enabled: true

  nat_gateways:
    strategy: one-per-az
    high_availability: true

  routing:
    public:
      default_route: igw

    private:
      - az: ap-south-1a
        default_route: nat-az-a

      - az: ap-south-1b
        default_route: nat-az-b

security:
  security_groups:
    alb:
      inbound:
        - 80/tcp from 0.0.0.0/0
        - 443/tcp from 0.0.0.0/0
      outbound:
        - all

    web:
      inbound:
        - 80/tcp from alb
      outbound:
        - all

    db:
      inbound:
        - 3306/tcp from web
      outbound:
        - restricted

load_balancer:
  name: cloud-arch-dev-alb
  type: application
  scheme: internet-facing
  subnets: public
  security_group: alb

  listener:
    port: 80
    protocol: HTTP
    action: forward

  target_group:
    name: cloud-arch-dev-web-tg
    port: 80
    protocol: HTTP

    health_check:
      path: /
      interval: 10
      timeout: 5
      healthy_threshold: 2
      unhealthy_threshold: 2

compute:
  launch_template:
    instance_type: t3.micro
    ami: amazon-linux-2023
    iam_role: ec2-instance-role

  auto_scaling_group:
    name: cloud-arch-dev-web-asg
    subnets: private
    min: 2
    desired: 2
    max: 4

    health_check:
      type: ELB
      grace_period: 60

    scaling:
      policy: target-tracking
      metric: ASGAverageCPUUtilization
      target: 50

data:
  database:
    type: rds
    engine: mysql
    multi_az: true
    accessibility: private
    backups: enabled
    retention_days: 7

access:
  method: ssm
  ssh: disabled

observability:
  metrics:
    enabled: true
    sources:
      - ec2
      - alb
      - asg

  logs:
    application:
      source: ec2
      retention_days: 7

    alb_access_logs:
      enabled: true

  alarms:
    - name: cpu_high
      metric: CPUUtilization
      threshold: 70

    - name: unhealthy_hosts
      metric: UnHealthyHostCount
      threshold: 1

    - name: high_latency
      metric: TargetResponseTime
      threshold: 1

  debugging:
    method: metrics_to_logs_correlation

state:
  backend:
    type: s3
    bucket: omkar-terraform-backend-shared-state
    key: cloud-arch/dev/terraform.tfstate
    region: ap-south-1
    encryption: true

  locking:
    type: dynamodb
    table: omkar-terraform-backend-shared-lock

iam:
  roles:
    - name: ec2-instance-role
      purpose: application runtime access via SSM

    - name: terraform-execution-role
      purpose: infrastructure provisioning

  principles:
    least_privilege: true
    no_static_credentials: true

  boundaries:
    terraform_scope: infrastructure_only
    ec2_scope: application_runtime_only

reliability:
  multi_az: true

  self_healing:
    asg_replacement: enabled

  failure_domains:
    - instance
    - availability_zone
    - dependency

  recovery:
    instance_failure: auto_replace
    az_failure: traffic_shift

deployment:
  strategy: rolling
  zero_downtime: true
  validation: pre-release

slo:
  availability: 99%
  latency_p95_ms: 500

cost:
  considerations:
    - nat_gateway_per_az_cost
    - autoscaling_compute_cost
    - alb_fixed_cost

tagging:
  global:
    Service: cloud-arch
    Environment: dev
    Owner: omkar
    ManagedBy: terraform

  resource_specific:
    Name: required
    Layer: required
