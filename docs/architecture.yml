environment: dev
project: pr1
system: cloud-architect-journey

vpc:
  name: pr1-dev-vpc
  cidr: 10.0.0.0/16
  dns_support: true
  dns_hostnames: false

subnets:
  public:
    - name: public-subnet-1
      cidr: 10.0.1.0/24
      az: ap-south-1a

    - name: public-subnet-2
      cidr: 10.0.3.0/24
      az: ap-south-1b

  private:
    - name: private-subnet-1
      cidr: 10.0.2.0/24
      az: ap-south-1a

    - name: private-subnet-2
      cidr: 10.0.4.0/24
      az: ap-south-1b

networking:
  internet_gateway:
    enabled: true

  nat_gateways:
    strategy: one-per-az
    eips:
      - pr1-dev-eip-az-a
      - pr1-dev-eip-az-b

  routing:
    public:
      route: 0.0.0.0/0 → igw
    private:
      az-a: 0.0.0.0/0 → nat-az-a
      az-b: 0.0.0.0/0 → nat-az-b

security:
  security_groups:
    alb:
      inbound:
        - 80/tcp from 0.0.0.0/0
        - 443/tcp from 0.0.0.0/0
      outbound:
        - all

    web:
      inbound:
        - 80/tcp from alb
      outbound:
        - all

    db:
      inbound:
        - 3306/tcp from web
      outbound:
        - restricted

load_balancer:
  name: pr1-dev-alb
  type: application
  scheme: internet-facing
  subnets: public
  security_group: alb

  listener:
    port: 80
    protocol: HTTP
    action: forward → web-target-group

  target_group:
    name: pr1-dev-web-tg
    port: 80
    protocol: HTTP

    health_check:
      path: /
      interval: 10 # tuned
      timeout: 5
      healthy_threshold: 2
      unhealthy_threshold: 2
      matcher: 200-399

compute:
  launch_template:
    instance_type: t3.micro
    ami: amazon-linux-2023
    iam_role: ec2-ssm-role
    user_data:
      - nginx install
      - ssm agent enabled

  auto_scaling_group:
    name: pr1-dev-web-asg
    subnets: private
    min: 2
    desired: 2
    max: 3

    health_check:
      type: ELB
      grace_period: 60

    scaling:
      policy: target-tracking
      metric: ASGAverageCPUUtilization
      target: 50

data_layer:
  rds:
    engine: mysql
    multi_az: true
    subnets: private
    security_group: db
    access:
      only_from: web-tier
    backup:
      retention_days: 7

access:
  method: ssm
  ssh: disabled

observability:
  cloudwatch:
    metrics:
      enabled: true

    logs:
      application:
        source: ec2
        retention: 7

      alb_access_logs:
        enabled: true
        destination: s3

    alarms:
      - name: cpu_high
        namespace: AWS/EC2
        metric: CPUUtilization
        threshold: 70
        evaluation_periods: 2

      - name: unhealthy_hosts
        namespace: AWS/ApplicationELB
        metric: UnHealthyHostCount
        threshold: 1
        evaluation_periods: 1

    notifications:
      sns:
        enabled: true
        purpose: alerting

state_management:
  backend:
    type: s3
    encryption: enabled
    versioning: enabled

  locking:
    type: dynamodb

iam:
  roles:
    - name: ec2-ssm-role
      purpose: ssm + instance management

    - name: terraform-execution-role
      purpose: infra provisioning

  principle:
    least_privilege: true

tagging:
  required:
    - Project
    - Environment
    - Owner
    - System
    - Component

  enforced: true
